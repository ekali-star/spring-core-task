spring:
  profiles:
    active: local
  jpa:
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.example.gymcrm: DEBUG

jwt:
  secret: your-256-bit-secret-key-here-must-be-at-least-32-chars
  expiration-ms: 86400000
